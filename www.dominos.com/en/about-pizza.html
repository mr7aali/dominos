 forth in the [official rules](https://eprize-content.s3.amazonaws.com/dominos/DeliveryInsurance/rules.pdf). This limit excludes points or discount offers initiated by your store or other limited-time offers. Insurance coverage for this promotion applies exclusively to Domino's Pizza LLC, its affiliates, and independent franchisees. Broader restrictions apply, visit the [Domino's Delivery Insurance](https://eprize-content.s3.amazonaws.com/dominos/DeliveryInsurance/rules.pdf) program terms and conditions.\n\u003c/details\u003e\n\u003cdetails\u003e\n  \u003csummary\u003ePizza Near Me\u003c/summary\u003e\n  Are you looking for pizza delivery? Let Domino's fill that special place in your heart. It might sound cheesy, but we want to be your favorite pizza restaurant. We love to provide our fans with the best pizza deals that Domino's has to offer. Next time you're thinking of food places near me, don't forget about Domino's. With over 5,000 pizza places to choose from, you're only a few clicks away from a delicious pizza.\n  \n  To easily find a local Domino's Pizza restaurant or when searching for \"pizza near me\", please visit our localized mapping website featuring nearby Domino's Pizza stores available for delivery or takeout.\n\u003c/details\u003e\nThis site is protected by reCAPTCHA Enterprise and the Google [Privacy Policy](https://policies.google.com/privacy) and [Terms of Service](https://policies.google.com/terms) apply."}},"es":{"translation":{"disclaimer":"\u003cdetails\u003e\n  \u003csummary\u003eAllergen Warning\u003c/summary\u003e\n  Domino's pizza made with a Gluten Free Crust is prepared in a common kitchen with the risk of gluten exposure. Therefore, Domino's DOES NOT recommend this pizza for customers with celiac disease. Customers with gluten sensitivities should exercise judgment in consuming this pizza.\n  \n  Domino's menu items are prepared in stores using a common kitchen. As a result, there may be cross contact between allergens. Customers with an allergen concern should exercise judgement in consuming Domino's menu items. For a listing of allergens that may appear in Domino's stores, please visit our Allergen Page.\n\u003c/details\u003e\n\u003cdetails\u003e\n  \u003csummary\u003eDomino's Rewards\u003c/summary\u003e\n  Domino's Rewards® is open only to US residents 13+ with a Domino's Profile account who order from participating Domino's locations. Point redemption only valid online at participating locations in the US. *Limit: one order of $10 or more (excludes tip and donations) per calendar day can earn points. For complete details visit dominos.com/rewards.\n\u003c/details\u003e\n\u003cdetails\u003e\n  \u003csummary\u003eOur Guarantee\u003c/summary\u003e\n  If you are not completely satisfied with your Domino's Pizza experience, we will make it right or refund your money.\n\u003c/details\u003e\n\u003cdetails\u003e\n  \u003csummary\u003eDelivery and Carryout Insurance\u003c/summary\u003e\n  Domino's Carryout Insurance program is only available to carryout customers who return their damaged order, uneaten, in its original packaging (inclusive of an order label or receipt) to the store from which it was originally purchased within at least two hours of the time of purchase. Damaged orders will be replaced with identical products and no substitutions will be permitted. This is a limited time offer and store participation may vary.\n  \n  *Domino's Delivery Insurance Program is only available to Domino's Rewards® members who report an issue with their delivery order through the form on order confirmation or in Domino's Tracker® within 16 hours of the time of purchase. If you are not a member, you must enroll within seven (7) days after you report an issue to receive the Delivery Insurance Points or you may elect to receive a discount coupon in lieu of the points. Store participation may vary. Limit: up to four (4) Make Good Offers per customer per time period set forth in the official rules. This limit excludes points or discount offers initiated by your store or other limited-time offers. Insurance coverage for this promotion applies exclusively to Domino's Pizza LLC, its affiliates, and independent franchisees. Broader restrictions apply, visit DominosDeliveryInsurance.com for program terms and conditions.\n\u003c/details\u003e\n\u003cdetails\u003e\n  \u003csummary\u003ePizza Near Me\u003c/summary\u003e\n  Are you looking for pizza delivery? Let Domino's fill that special place in your heart. It might sound cheesy, but we want to be your favorite pizza restaurant. We love to provide our fans with the best pizza deals that Domino's has to offer. Next time you're thinking of food places near me, don't forget about Domino's. With over 5,000 pizza places to choose from, you're only a few clicks away from a delicious pizza.\n  \n  To easily find a local Domino's Pizza restaurant or when searching for \"pizza near me\", please visit our localized mapping website featuring nearby Domino's Pizza stores available for delivery or takeout.\n\u003c/details\u003e\nThis site is protected by reCAPTCHA Enterprise and the GooglePrivacy [Policy](https://policies.google.com/privacy) and [Terms of Service](https://policies.google.com/terms) apply."}}},{"en":{"translation":{"disclosure_links":"[CA Transparency in Supply Chains Act Disclosures](https://www.dominos.com/en/?scrollTo=js-californiaTransparencyInSupplyChainsAct#!/content/terms/)\n\n[CA Consumer Privacy Act](https://www.dominos.com/data-privacy-right)\n\n[Accessibility Policy](https://www.dominos.com/en/?legacyrouting=content/accessibility-policy#!/content/accessibility-policy/)\n\nIf you are using a screen reader and are having problems using this website, please call [800-252-4031](tel:8002524031) for assistance.","disclosure_internal_links":"## Mix \u0026 Match Offer Details\n\nYou must choose this limited time offer. Prices, participation, delivery area, and charges may vary by store. 2-item minimum. Bone-in Wings, Parmes nline for a variety of menu options including medium 2-topping pizzas.\n \n\n## B. Participation in the Program\n1. The Program is open to legal residents of the fifty (50) United States and District of Columbia who are at least thirteen (13) years of age or older. It is void where prohibited by law.\n2. Participation in the Program constitutes each Participant's full and unconditional agreement to these Program Terms and Conditions (\"Rules\"). Those who do not comply with these Rules may be prohibited from participating in the Program as determined by Sponsor in its sole discretion. By accepting these Rules and signing up for the Program, you hereby agree to receive email messages from Sponsor regarding the status of your Domino’s Profile and Points total.  \n3. Registration. To enroll in this Program, each Participant must create an online \u003cAuthLink\u003e Domino's Profile \u003c/AuthLink\u003e. and agree to these Rules. Participants may be required to complete multifactor authentication using a mobile device in order to create their account.  **Standard data charges from your wireless carrier may apply.** There is no cost to create a Domino’s Profile,  but it is subject to the \u003cTermsLink\u003e Terms of Use \u003c/TermsLink\u003e. There is a limit of one (1) Domino’s Profile per person. The person who is the authorized e-mail account holder of the e-mail address indicated when registering (and who otherwise meets the eligibility criteria) will be deemed the Participant.\n4. Participant's Personal Information: To learn how Sponsor will use the personal information collected in connection with the Domino’s Profile and/or this Program, read Sponsor's Privacy Policy: [Sponsor's Privacy Policy](https://www.dominos.com/en/?legacyrouting=content/privacy#/content/privacy/).\n\n\n## C. Modification and Termination of the Program. \n1. The Program originally began on or about August 24, 2015 at 9:00 a.m. Eastern Time (\"ET\") as Domino’s Piece of the Pie Rewards® and was relaunched as Domino’s Rewards on or about September 5, 2023 at 9:00 a.m. Eastern Time.\n2. By participating in the Program, Participants hereby agree that Sponsor may modify these Rules, including termination of the Program, with or without notice even though these changes may affect a Participant's ability to redeem accumulated Points.\n3. A Participant's continued participation in the Program constitutes his or her acceptance of any changes to these Rules.\n\n\n## D. Collecting Points\n \n1. Earning Points through Purchase: Once enrolled, when you make a **\"Qualifying Order\"** you will receive 10 points. Limit: A participant may only receive 10 points each day, regardless of the number of **Qualifying Orders** made during the day. A Qualifying Order is defined as any order made through any digital channel, in person or by telephone of at least $5 or more in any participating Domino's location in the United States. There are no restrictions regarding the content of your order, and you may reach the required $5 minimum by including delivery fees and taxes. Gratuities will be excluded from the determination of a Qualifying Order. In addition, the following requirements apply depending on the order mechanism: \u003cul type=\"a\"\u003e\u003cli\u003e For Online/Digital Orders: You should be signed into your Domino’s Profile when making the order. Participant may request Points later as described below in Section D. 2 \u003c/li\u003e \u003cli\u003e For In Person or Telephone Orders: You must provide the telephone number associated with your Domino’s Profile at the time of your order.  Participant may request Points later as described below in Section D. 2. \u003c/li\u003e\u003c/ul\u003e\n2. **Earning Points for After Order is Placed.** If you make a Qualifying Order online without being logged into your Domino’s Profile or if you make telephone or in-person order without providing the phone number associated with your Domino’s Profile, you may make a request for Points after receiving your order. However, you must make the request using a valid Domino’s Profile (which may be created after your Qualifying Order) within thirty (30) days of the date of the Qualifying Order by visiting [www.dominos.com/en/pages/rewards/#!/claim/](https://www.dominos.com/en/pages/rewards/#!/claim/).  You will need to submit the order number and the unique rewards code associated with the Qualifying Order included on your receipt and box label. Requests for Bonus Points will not be accepted. Limit: You may only make one (1) post purchase request every thirty (30) calendar days.\n3. **Earn Bonus Points or Other Rewards.** From time to time, you may be offered the ability to earn Bonus Points or other rewards for a single Qualifying Order during a limited time-period. Depending on the offer, you may be required to first activate the offer by following the instructions provided before you make the purchase to receive the Bonus Points or receive the reward. Your online, phone or in-store Qualifying Order must be completed during the stated time-period and must be completed with the email address associated with your Domino’s Profile.\n4. **No Cash Value or Transferability.** Points do not constitute property, do not entitle a member a vested right or interest and have no cash value. As such, Points are not redeemable for cash, transferable or assignable for any reason, and are not transferable upon death, as part of a domestic relations matter or otherwise by operation of law. The sale of Points is strictly prohibited and any Participant identified by Sponsor attempting to sell Points may have his/her Domino’s Profile terminated. Any Points remaining in a Participant's Account if the Program is terminated will be forfeited without compensation. There shall be no carry over or transfer of Points to other Sponsor programs (if any), unless otherwise determined by Sponsor in its sole and absolute discretion.\n\n\n## E. Point Redemption\n \n1. **Rewards**: Participants who have earned Points may redeem their Points for a variety of menu items (each a “Reward”) as displayed on the Rewards site when they make an online order at participating Domino’s locations within the United States. Sponsor may modify the available menu items and the the number of Points needed to redeem for each such menu item. These changes will be displayed on the Rewards site and Sponsor will message that change to all Participants prior to its implementation.\n2. **How to Redeem Points:** Participants may only redeem Points at Domino's locations in the United States through online channels by clicking on the redemption link in their Rewards Meter and following the instructions for redemption. Additional charges apply when selecting certain crust types and/or additional toppings (as determined by the store location). Additional authentication may be required to prevent fraud when redeeming Points. Redemption for all Rewards are subject to the participating store’s minimum delivery requirements. Participant shall remain responsible for applicable sales tax, state fees, delivery charge and gratuities for orders including a Reward.  **Limit:** A Participant may redeem one (1) Reward per order. ** If you would like to redeem Points for a free Small 2-Topping Gluten Free Crust Pizza, you must follow this process: sign into your Domino’s Profile account and enter the code GFCRUST in the coupons section while placing your online order. A zero-dollar balance will be reflected in your cart for the Reward and 60 Points will be deducted from your Domino’s Profile account.\n3. **Point Redemption Final:** All Reward redemptions are final, and the Points will be deducted immediately from Participant's Account. Sponsor will not provide any refunds once Points are redeemed.\n4. **Promotional Offers:**  From time to time, Sponsor may, in its sole discretion, elect to offer promotional opportunities for Participants to redeem Points in addition to the ability to redeem Points for the Menu Items as set forth above. These promotional offers may only be available for a limited time period, may offer promotional points with pre-set expiration dates and may be limited to select store locations. Sponsor will provide the specific terms and conditions of any promotional offers at such time.\n\n\n## F. Inactivity and Forfeiture\n \n1. If a Participant fails to either earn or redeem Points for one hundred eighty (180) consecutive calendar days, the Participant will forfeit any Points remaining in his/her Domino’s Profile, without compensation.\n\n\n## G. General Terms and Conditions\n \n1. Sponsor reserves the right to suspend or discontinue the eligibility of any person who uses, or, in the case of suspension, is suspected of using, the Program in a manner inconsistent with these Rules or any federal or state laws, statutes or ordinances. In addition to suspension or discontinuance of the Program eligibility, Sponsor shall have the right to take appropriate administrative and/or legal action, including criminal prosecution, as it deems necessary in its sole discretion.\n2. Any attempt by any person to undermine the legitimate operation of the Program may be a violation of criminal and civil law, and, should such an attempt be made, Sponsor reserves the right to seek damages from any such person to the fullest extent permitted by law. Sponsor's failure to enforce any of these Rules shall not constitute a waiver of that, or any other, provision.\n3. All questions or disputes regarding eligibility for the Program, accumulation of and redemption of Points, or a Participant's compliance with these Rules will be resolved by Sponsor in its sole discretion.\n4. Sponsor is not responsible for any incorrect or inaccurate information supplied by Participants while participating in the Program.\n5. Participants are responsible for the payment of all taxes which may result from participation in the Program.\n6. Participants are responsible for maintaining updated contact information in their Domino’s Profile. Information contained in the Domino’s Profile may be used to contact Participants.\n7. The Program is subject to all applicable laws, rules and regulations.\n\n\n## H. Limitation of Liability\n \n1. Sponsor, its affiliates, subsidiaries, franchisees, and promotional and advertising agencies are not responsible for any printing or computer error, omission, interruption, irregularity, deletion, defect, delay in operations or transmission, theft or destruction or unauthorized access to or alteration of Program materials or for technical, network, telephone equipment, electronic, computer, hardware or software malfunctions of any kind, or inaccurate transmission of Program information due to technical problems or traffic congestion on the internet, at any web site or any combination thereof.\n2. By participating in the Program, each Participant accepts all responsibility for, and hereby releases and agrees to indemnify and hold harmless Sponsor and their respective parent companies, subsidiaries, affiliates, agents, promotion and advertising agencies, franchisees, and each of their respective officers, directors, employees, shareholders, and successors, assigns, and service providers from and against any claims, liabilities, damages, or expenses that may arise from actions taken by such Participant and/or Participant\u0026apos;s participation in the Program, or for any harm or injury caused by any third party.\n3. UNDER NO CIRCUMSTANCES, INCLUDING, BUT NOT LIMITED TO, NEGLIGENCE, SHALL SPONSOR, DOMINO'S PIZZA LLC, AND THEIR RESPECTIVE OFFICERS, DIRECTORS, EMPLOYEES, SHAREHOLDERS, AGENTS, INDEPENDENTLY OWNED AND OPERATED DOMINO'S FRANCHISE STORES, SUCCESSORS, ASSIGNS, AND SERVICE PROVIDERS BE LIABLE FOR ANY DIRECT, INDIRECT, INCIDENTAL, SPECIAL OR CONSEQUENTIAL DAMAGES ARISING OUT OF PARTICIPATION IN THE PROGRAM OR ANY PURCHASED ITEM, EVEN IF ANY OR ALL OF THE FOREGOING OR ANY OF THEIR AUTHORIZED REPRE  a User's access to its Websites or Applications, if they are determined to be a repeat infringer. A repeat infringer is a User who has been notified of infringing activity twice and/or has had a User Submission removed from the Websites or Applications. Domino's also reserves the right to decide whether Content or a User Submission is appropriate and complies with these Terms of Use for violations other than copyright infringement and violations of intellectual property law, such as, but not limited to, pornography, obscene or defamatory material, or excessive length. Domino's may remove such User Submissions and/or terminate a User's access for uploading such material in violation of these Terms of Use at any time, without prior notice and at its sole discretion. In addition, you agree that you will not email any of your User Submissions or links to your User Submissions to individuals with whom you are not acquainted.\n4. In particular, if you are a copyright owner or an agent thereof and believe that any User Submission or other content infringes upon your copyrights, you may submit a notification pursuant to the Digital Millennium Copyright Act (\"DMCA\") by providing our Copyright Agent with the following information in writing (see 17 U.S.C 512(c)(3) for further detail):\n\n   - A physical or electronic signature of a person authorized to act on behalf of the owner of an exclusive right that is allegedly infringed;\n   - Identification of the copyrighted work claimed to have been infringed, or, if multiple copyrighted works at a single online site are covered by a single notification, a representative list of such works at that site;\n   - Identification of the material that is claimed to be infringing or to be the subject of infringing activity and that is to be removed or access to which is to be disabled and information reasonably sufficient to permit the service provider to locate the material;\n   - Information reasonably sufficient to permit the service s originally purchased within at least two hours of the time of purchase. Damaged orders will be replaced with identical products and no substitutions will be permitted. This is a limited time offer and store participation may vary.\n  \n  *Domino's Delivery Insurance Program is only available to Domino's® Rewards members who report an issue with their delivery order through the form on order confirmation or in Domino's Tracker® within 16 hours of the time of purchase. If you are not a member, you must enroll within seven (7) days after you report an issue to receive the Delivery Insurance Coupon. Store participation may vary. Limit: up to four (4) Make Good Offers per customer per time period set forth in the [official rules](https://eprize-content.s3.amazonaws.com/dominos/DeliveryInsurance/rules.pdf). This limit excludes points or discount offers initiated by your store or other limited-time offers. Insurance coverage for this promotion applies exclusively to Domino's Pizza LLC, its affiliates, and independent franchisees. Broader restrictions apply, visit the [Domino's Delivery Insurance](https://eprize-content.s3.amazonaws.com/dominos/DeliveryInsurance/rules.pdf) program terms and conditions.\n\u003c/details\u003e\n\u003cdetails\u003e\n  \u003csummary\u003ePizza Near Me\u003c/summary\u003e\n  Are you looking for pizza delivery? Let Domino's fill that special place in your heart. It might sound cheesy, but we want to be your favorite pizza restaurant. We love to provide our fans with the best pizza deals that Domino's has to offer. Next time you're thinking of food places near me, don't forget about Domino's. With over 5,000 pizza places to choose from, you're only a few clicks away from a delicious pizza.\n  \n  To easily find a local Domino's Pizza restaurant or when searching for \"pizza near me\", please visit our localized mapping website featuring nearby Domino's Pizza stores available for delivery or takeout.\n\u003c/details\u003e\nThis site is protected by reCAPTCHA Enterprise and the Google [Privacy Policy](https://policies.google.com/privacy) and [Terms of Service](https://policies.google.com/terms) apply."},"disclosures":{"disclosure_links":"[CA Transparency in Supply Chains Act Disclosures](https://www.dominos.com/en/?scrollTo=js-californiaTransparencyInSupplyChainsAct#!/content/terms/)\n\n[CA Consumer Privacy Act](https://www.dominos.com/en/?scrollTo=js-ccpa#!/content/privacy/)\n\n[Accessibility Policy](https://www.dominos.com/en/?legacyrouting=content/accessibility-policy#!/content/accessibility-policy/)\n\nIf you are using a screen reader and are having problems using this website, please call [800-252-4031](tel:8002524031) for assistance.","disclosure_internal_links":"## Mix \u0026 Match Offer Details\n\nYou must choose this limited time offer. Prices, participation, delivery area, and charges may vary by store. 2-item minimum. Bone-in Wings, Parmesan Stuffed Crust and Pan Pizza are extra.\nEach store may charge extra for some items, crust types, toppings, and sauces. Choose or contact your local store for specific offer pricing. Delivery orders subject to each store's delivery minimum and delivery charge. Any delivery charge is not a tip paid to your driver. Drivers carry less than $20.\n\n## Weeklong Carryout Offer Details\n\nCarryout only. You must choose for this limited time offer. Prices, participation and charges may vary. Size availability varies by crust type. Parmesan Stuffed Crust will be extra. Excludes XL and Specialty Pizzas. In addition, your local store may charge extra for some toppings and sauces.\n\n## Perfect Combo Offer Details\n\nYou must choose this limited time offer. Delivery charge and tax may apply. Prices, participation, delivery area and charges may vary. Parmesan Stuffed Crust and Handmade Pan will be extra. No substitutions permitted. In addition, your local store may charge extra for some toppings and sauces.\n\n## Offer Details\n\nAny Delivery Charge is not a tip paid to your racker":"Order Tracker | Domino's","/my-deals-and-rewards":"My Deals and Rewards | Domino's","/menu/build-your-own":"Build Your Own Pizza Near Me | Domino's"},"terms_and_conditions_modal":{"terms_and_conditions_modal":{"header":null,"content":"## A. Overview of Domino\u0026apos;s® Rewards Loyalty Program\n1. Domino's Rewards (the \"Program\") is a loyalty program sponsored by Domino's National Advertising Fund Inc. (\"Sponsor\"). Individuals (\"Participants\") can enroll in the Program by creating an online account (herein “Domino’s Profile\") and can collect points (\"Points\") by making qualifying orders. Participants may redeem their Points online for a variety of menu options including medium 2-topping pizzas.\n \n\n## B. Participation in the Program\n1. The Program is open to legal residents of the fifty (50) United States and District of Columbia who are at least thirteen (13) years of age or older. It is void where prohibited by law.\n2. Participation in the Program constitutes each Participant's full and unconditional agreement to these Program Terms and Conditions (\"Rules\"). Those who do not comply with these Rules may be prohibited from participating in the Program as determined by Sponsor in its sole discretion. By accepting these Rules and signing up for the Program, you hereby agree to receive email messages from Sponsor regarding the status of your Domino’s Profile and Points total.  \n3. Registration. To enroll in this Program, each Participant must create an online \u003cAuthLink\u003e Domino's Profile \u003c/AuthLink\u003e. and agree to these Rules. Participants may be required to complete multifactor authentication using a mobile device in order to create their account.  **Standard data charges from your wireless carrier may apply.** There is no cost to create a Domino’s Profile,  but it is subject to the \u003cTermsLink\u003e Terms of Use \u003c/TermsLink\u003e. There is a limit of one (1) Domino’s Profile per person. The person who is the authorized e-mail account holder of the e-mail address indicated when registering (and who otherwise meets the eligibility criteria) will be deemed the Participant.\n4. Participant's Personal Information: To learn how Sponsor will use the personal information collected in connection with the Domino’s Profile and/or this Program, read Sponsor's Privacy Policy: [Sponsor's Privacy Policy](https://www.dominos.com/en/?legacyrouting=content/privacy#/content/privacy/).\n\n\n## C. Modification and Termination of the Program. \n1. The Program originally began on or about August 24, 2015 at 9:00 a.m. Eastern Time (\"ET\") as Domino’s Piece of the Pie Rewards® and was relaunched as Domino’s Rewards on or about September 5, 2023 at 9:00 a.m. Eastern Time.\n2. By participating in the Program, Participants hereby agree that Sponsor may modify these Rules, including termination of the Program, with or without notice even though these changes may affect a Participant's ability to redeem accumulated Points.\n3. A Participant's continued participation in the Program constitutes his or her acceptance of any changes to these Rules.\n\n\n## D. Collecting Points\n \n1. Earning Points through Purchase: Once enrolled, when you make a **\"Qualifying Order\"** you will receive 10 points. Limit: A participant may only receive 10 points each day, regardless of the number of **Qualifying Orders** made during the day. A Qualifying Order is defined as any order made through any digital channel, in person or by telephone of at least $5 or more in any participating Domino's location in the United States. There are no restrictions regarding the content of your order, and you may reach the required $5 minimum by including delivery fees and taxes. Gratuities will be excluded from the determination of a Qualifying Order. In addition, the following requirements apply depending on the order mechanism: \u003cul type=\"a\"\u003e\u003cli\u003e For Online/Digital Orders: You should be signed into your Domino’s Profile when making the order. Participant may request Points later as described below in Section D. 2 \u003c/li\u003e \u003cli\u003e For In Person or Telephone Orders: You must provide the telephone number associated with your Domino’s Profile at the time of your order.  Participant may request Points later as described below in Section D. 2. \u003c/li\u003e\u003c/ul\u003e\n2. **Earning Points for After Order is Placed.** If you make a Qualifying Order online without being logged into your Domino’s Profile or if you make telephone or in-person order without providing the phone number associated with your Domino’s Profile, you may make a request for Points after receiving your order. However, you must make the request using a valid Domino’s Profile (which may be created after your Qualifying Order) within thirty (30) days of the date of the Qualifying Order by visiting [www.dominos.com/en/pages/rewards/#!/claim/](https://www.dominos.com/en/pages/rewards/#!/claim/).  You will need to submit the order number and the unique rewards code associated with the Qualifying Order included on your receipt and box label. Requests for Bonus Points will not be accepted. Limit: You may only make one (1) post purchase request every thirty (30) calendar days.\n3. **Earn Bonus Points or Other Rewards.** From time to time, you may be offered the ability to earn Bonus Points or other rewards for a single Qualifying Order during a limited time-period. Depending on the offer, you may be required to first activate the offer by following the instructions provided before you make the purchase to receive the Bonus Points or receive the reward. Your online, phone or in-store Qualifying Order must be completed during the stated time-period and must be completed with the email address associated with your Domino’s Profile.\n4. **No Cash Value or Transferability.** Points do not constitute property, do not entitle a member a vested right or interest and have no cash value. As such, Points are not redeemable for cash, transferable or assignable for any reason, and are not transferable upon death, as part of a domestic relations matter or otherwise by operation of law. The sale of Points is strictly prohibited and any Participant identified by Sponsor attempting to sell Points may have his/her Domino’s Profile terminated. Any Points remaining in a Participant's Account if the Program is terminated will be forfeited without compensation. There shall be no carry over or transfer of Points to other Sponsor programs (if any), unless otherwise determined by Sponsor in its sole and absolute discretion.\n\n\n## E. Point Redemption\n \n1. **Rewards**: Participants who have earned Points may redeem their Points for a variety of menu items (each a “Reward”) as displayed on the Rewards site when they make an online order at participating Domino’s locations within the United States. Sponsor may modify the available menu items and the the number of Points needed to redeem for each such menu item. These changes will be displayed on the Rewards site and Sponsor will message that change to all Participants prior to its implementation.\n2. **How to Redeem Points:** Participants may only redeem Points at Domino's locations in the United States through online channels by clicking on the redemption link in their Rewards Meter and following the instructions for redemption. Additional charges apply when selecting certain crust types and/or additional toppings (as determined by the store location). Additional authentication may be required to prevent fraud when redeeming Points. Redemption for all Rewards are subject to the participating store’s minimum delivery requirements. Participant shall remain responsible for applicable sales tax, state fees, delivery charge and gratuities for orders including a Reward.  **Limit:** A Participant may redeem one (1) Reward per order. ** If you would like to redeem Points for a free Small 2-Topping Gluten Free Crust Pizza, you must follow this process: sign into your Domino’s Profile account and enter the code GFCRUST in the coupons section while placing your online order. A zero-dollar balance will be reflected in your cart for the Reward and 60 Points will be deducted from your Domino’s Profile account.\n3. **Point Redemption Final:** All Reward redemptions are final, and the Points will be deducted immediately from Participant's Account. Sponsor will not provide any refunds once Points are redeemed.\n4. **Promotional Offers:**  From time to time, Sponsor may, in its sole discretion, elect to offer promotional opportunities for Participants to redeem Points in addition to the ability to redeem Points for the Menu Items as set forth above. These promotional offers may only be available for a limited time period, may offer promotional points with pre-set expiration dates and may be limited to select store locations. Sponsor will provide the specific terms and conditions of any promotional offers at such time.\n\n\n## F. Inactivity and Forfeiture\n \n1. If a Participant fails to either earn or redeem Points for one hundred eighty (180) consecutive calendar days, the Participant will forfeit any Points remaining in his/her Domino’s Profile, without compensation.\n\n\n## G. General Terms and Conditions\n \n1. Sponsor reserves the right to suspend or discontinue the eligibility of any person who uses, or, in the case of suspension, is suspected of using, the Program in a manner inconsistent with these Rules or any federal or state laws, statutes or ordinances. In addition to suspension or discontinuance of the Program eligibility, Sponsor shall have the right to take appropriate administrative and/or legal action, including criminal prosecution, as it deems necessary in its sole discretion.\n2. Any attempt by any person to undermine the legitimate operation of the Program may be a violation of criminal and civil law, and, should such an attempt be made, Sponsor reserves the right to seek damages from any such person to the fullest extent permitted by law. Sponsor's failure to enforce any of these Rules shall not constitute a waiver of that, or any other, provision.\n3. All questions or disputes regarding eligibility for the Program, accumulation of and redemption of Points, or a Participant's compliance with these Rules will be resolved by Sponsor in its sole discretion.\n4. Sponsor is not responsible for any incorrect or inaccurate information supplied by Participants while participating in the Program.\n5. Participants are responsible for the payment of all taxes which may result from participation in the Program.\n6. Participants are responsible for maintaining updated contact information in their Domino’s Profile. Information contained in the Domino’s Profile may be used to contact Participants.\n7. The Program is subject to all applicable laws, rules and regulations.\n\n\n## H. Limitation of Liability\n \n1. Sponsor, its affiliates, subsidiaries, franchisees, and promotional and advertising agencies are not responsible for any printing or computer error, omission, interruption, irregularity, deletion, defect, delay in operations or transmission, theft or destruction or unauthorized access to or alteration of Program materials or for technical, network, telephone equipment, electronic, computer, hardware or software malfunctions of any kind, or inaccurate transmission of Program information due to technical problems or traffic congestion on the internet, at any web site or any combination thereof.\n2. By participating in the Program, each Participant accepts all responsibility for, and hereby releases and agrees to indemnify and hold harmless Sponsor and their respective parent companies, subsidiaries, affiliates, agents, promotion and advertising agencies, franchisees, and each of their respective officers, directors, employees, shareholders, and successors, assigns, and service providers from and against any claims, liabilities, damages, or expenses that may arise e of law or conflict of law rules (whether of the State of Michigan or any other jurisdiction), which would cause the application of the laws of any jurisdiction other than State of Michigan.\n5. If any provision of these Rules is found to be invalid or unenforceable by a court of competent jurisdiction, such provision shall be severed from the remainder of these Rules, which will otherwise\nremain in full force and effect.\n\n\n**Sponsored by:** Domino's National Advertising Fund Inc., 30 Frank Lloyd Wright Drive, Ann Arbor MI 48106. These Program terms were updated as of March 3, 2025.","footer":""}},"terms_of_use_modal":{"terms_of_use_modal":{"header":null,"content":"## Acceptance of Terms of Use\n\nThese Terms of Use govern your use of the online and mobile web site (the “Website” or, collectively, the \"Websites\"), and the tablet, smartphone and other applications and platforms, including but not limited to the Domino's Anyware platform ([https://anyware.dominos.com](https://anyware.dominos.com)), available through third party devices, (the \"Application\" or, collectively, the \"Applications\"), owned and/or operated by Domino's Pizza, Inc. and its affiliates and franchisees (hereinafter “Domino's” or \"Domino's Pizza\"). If you do not agree to these Terms of Use, you should not use the Websites or Applications. These Terms of Use are an ongoing contract between you and Domino's Pizza and apply to your use of the Websites or Applications. These Terms of Use affect your rights and you should read them carefully.\n\n## Changes to Terms of Use\n\nDomino's Pizza reserves the right, from time to time, with or without notice to you, to change these Terms of Use (other than the arbitration provision) in our sole and absolute discretion. The most current version of these Terms of Use can be reviewed by clicking on the \"Terms of Use\" located at the bottom of the pages of the online Website or on the Applications. The most current version of the Terms of Use will sup -campaign-mfe":{},"dpz-ecomm-cart-mfe":{},"dpz-ecomm-service-methods-mfe":{},"dpz-ecomm-shell":{},"footer_links":{},"header_menu_links":{},"product_titles":{},"static_titles":{},"terms_and_conditions_modal":{},"terms_of_use_modal":{},"dpz-ecomm-makeline-ui-mfe":{}}},"initialLocale":"en-US","ns":["category_titles","disclaimers","disclosures","dpz-ecomm-auth-mfe","dpz-ecomm-campaign-mfe","dpz-ecomm-cart-mfe","dpz-ecomm-service-methods-mfe","dpz-ecomm-shell","footer_links","header_menu_links","product_titles","static_titles","terms_and_conditions_modal","terms_of_use_modal","dpz-ecomm-makeline-ui-mfe"],"userConfig":null},"content":{"componentImagesConfig":[],"content":"How much do you know about Domino’s? When it comes to making and delivering delicious pizza, Domino’s is king. Domino’s operates more than 14,000 [pizza restaurants](https://www.dominos.com/about-pizza/pizza-restaurant/) in more than 85 countries, and delivers more than 1.5 million pizzas each day. Domino’s delivery experts drive more than 10 million miles across the United States every week to bring you the best food we can make. Talk about passion! Here’s how we became a powerhouse of pizza delivery.\n\n## All About Pizza Domination\nFrom humble beginnings as a single pizza restaurant in 1960, Domino’s has become today’s recognized world leader in pizza delivery. At Domino’s we’re all about pizza — and from the day our doors opened, we have dedicated ourselves to making and delivering delicious food with high-quality ingredients. Beyond pioneering the concept of efficiently delivering our made-to-order pizzas, we have been a part of innovations that have made a significant impact on the entire food delivery industry:\n\nDomino’s pioneered patented insulating bags to keep pizzas oven-hot during normal delivery.\nDomino’s created the sturdy corrugated pizza box, which keeps moisture from weakening the box and cheese from sticking to the top.\nDomino’s invented the 3D car-top sign, which is currently used by a variety of industries, including taxis and driving schools.\nWe’re all about delivery ideas that make it easier and more convenient for our customers. When you think about [pizza places](https://www.dominos.com/about-pizza/pizza-place-near-me/) that have delivered hot and fresh from the oven to your door, think Domino’s, because we’re constantly updating our [menu](https://www.dominos.com/menu) to include more entrees, sides, and [desserts](https://www.dominos.com/menu/dessert) created just for you.\n\n## Beyond Pizza Delivery\nWant to know more about pizza? Domino’s launched online pizza ordering in 2007, and in 2008, we revolutionized the online delivery experience by introducing the Pizza Builder and Domino’s Tracker® tools.\n\nWe’re all about pizza, as well as harnessing the power of technology to make your ordering experience even better. So we identified key ways our customers would benefit from online tools. Pizza Builder, an innovation in online food ordering, enables customers to make their favorite selections and see their pizza come to life on a computer screen. Domino’s Tracker® is an innovation in food delivery that enables customers to follow the progress of their order from the time it’s placed until it arrives at the door. We also added the Pizza Profile to the website, as well as Domino’s AnyWare™ ordering technologies, which enable customers to leverage technology to place their order via text, smartphone, tweet, and more. Finally, because we’re all about savings, we also added coupons and promos to the website.\n\nDomino’s innovations help us better deliver on our promise to bring customers great pizzas, pasta, sandwiches, desserts, and drinks as efficiently as possible.","promotionalCta":null,"seo":{"metaDescription":"Learn about Pizza and Domino's Pizza History in the restaurant industry since opening in 1960 - way beyond pizza delivery and not just pizza anymore.","metaKeywords":null,"metaTitle":"History of Domino's Pizza in the Pizza Res
